name: Post-Match Video
on:
  schedule:
    - cron: '15 */1 * * *'   # runs every hour (offset by 15m), checks if any match finished ~2hr ago
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r footybitez/requirements.txt
          pip install python-dotenv
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: remotion-video/package-lock.json
      - name: Install Remotion dependencies
        run: |
          cd remotion-video
          npm install
      - name: Install system browser dependencies
        run: |
          cd remotion-video
          npx playwright install-deps chromium
      - name: Install Playwright browser
        run: |
          cd remotion-video
          npx playwright install chromium
      - name: Run pipeline
        run: python footybitez/pipelines/post_match_pipeline.py
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          ENABLE_UPLOAD: 'true'
          ENABLE_SOCIAL_PUBLISHING: 'true'
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
      - name: Commit registry update
        run: |
          git config --global user.email "bot@footybitez.com"
          git config --global user.name "WC2026 Bot"
          git add match_registry.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update match registry [skip ci]" && git push)
