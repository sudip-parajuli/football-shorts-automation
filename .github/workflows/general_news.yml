name: Daily General Football News Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:
    inputs:
      skip_upload:
        description: 'Skip upload and social posting (dry run)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  produce-general-news:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r footybitez/requirements.txt
        # Ensure correct google-genai is installed
        pip install google-genai>=1.0.0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Node Dependencies
      run: |
        cd remotion-video
        npm install

    - name: Install system browser dependencies
      run: |
        cd remotion-video
        npx playwright install-deps chromium

    - name: Install Playwright browser
      run: |
        cd remotion-video
        npx playwright install chromium

    - name: Run General Football News Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        HUME_API_KEY: ${{ secrets.HUME_API_KEY }}
        HUME_VOICE_ID: ${{ secrets.HUME_VOICE_ID }}
        ENABLE_UPLOAD: ${{ github.event.inputs.skip_upload == 'true' && 'false' || 'true' }}
        ENABLE_SOCIAL_PUBLISHING: ${{ github.event.inputs.skip_upload == 'true' && 'false' || 'true' }}
        META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
        TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
        TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
        TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        SKIP_ARG=""
        if [ "${{ github.event.inputs.skip_upload }}" = "true" ]; then
          SKIP_ARG="--skip-upload"
        fi
        python -m footybitez.pipelines.general_news_pipeline $SKIP_ARG

    - name: Commit State File Updates
      if: always()
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add footybitez/data/general_news_state.json || true
        git commit -m "chore: update general football news crawl state [skip ci]" || true
        git push origin main || true
