name: FootyBitez Long-form Documentary Automation

on:
  schedule:
    # Sunday and Wednesday at 16:00 UTC
    # 16:00 UTC = 11:00 AM EST (USA/Canada), 4:00 PM GMT (UK)
    - cron: '0 16 * * 0,3'
  workflow_dispatch: # Allow manual trigger
    inputs:
      topic:
        description: 'Optional: Specific topic to generate (leave empty for auto-generated)'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-generate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r footybitez/requirements.txt
        pip install python-dotenv

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: remotion-video/package-lock.json

    - name: Install Remotion dependencies
      run: |
        cd remotion-video
        npm install

    - name: Install System Dependencies (Browsers)
      run: |
        cd remotion-video
        npx playwright install-deps chromium

    - name: Install Playwright Browsers
      run: |
        cd remotion-video
        npx playwright install chromium

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Run Documentary Pipeline
      env:
        # AI & Content
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
        GEMINI_API_KEY3: ${{ secrets.GEMINI_API_KEY3 }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GROQ_API_KEY2: ${{ secrets.GROQ_API_KEY2 }}
        GROQ_API_KEY3: ${{ secrets.GROQ_API_KEY3 }}
        
        # Audio (Hume)
        HUME_API_KEY_LONG_1: ${{ secrets.HUME_API_KEY_LONG_1 }}
        HUME_API_KEY_LONG_2: ${{ secrets.HUME_API_KEY_LONG_2 }}
        HUME_API_KEY_LONG_3: ${{ secrets.HUME_API_KEY_LONG_3 }}
        HUME_API_KEY_LONG_4: ${{ secrets.HUME_API_KEY_LONG_4 }}
        HUME_API_KEY_LONG_5: ${{ secrets.HUME_API_KEY_LONG_5 }}
        HUME_API_KEY_SHORT_1: ${{ secrets.HUME_API_KEY_SHORT_1 }}
        HUME_API_KEY_SHORT_2: ${{ secrets.HUME_API_KEY_SHORT_2 }}
        HUME_API_KEY_SHORT_3: ${{ secrets.HUME_API_KEY_SHORT_3 }}
        HUME_API_KEY_SHORT_4: ${{ secrets.HUME_API_KEY_SHORT_4 }}
        HUME_API_KEY_SHORT_5: ${{ secrets.HUME_API_KEY_SHORT_5 }}
        HUME_VOICE_ID: ${{ secrets.HUME_VOICE_ID }}
        HUME_VOICE_ID_1: ${{ secrets.HUME_VOICE_ID_1 }}
        HUME_VOICE_ID_2: ${{ secrets.HUME_VOICE_ID_2 }}
        
        # Media Sourcing
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        
        # YouTube
        YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        ENABLE_UPLOAD_LONG: "true"
        ENABLE_SOCIAL_PUBLISHING: "true"
        META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
        TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
        TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
        TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        if [ -n "${{ github.event.inputs.topic }}" ]; then
          node remotion-video/scripts/generate.js --topic "${{ github.event.inputs.topic }}"
        else
          node remotion-video/scripts/generate.js
        fi
