name: Backfill Missed Matches

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limit the number of matches to backfill (e.g., 3)'
        required: false
        default: '3'
        type: string
      skip_upload:
        description: 'Skip upload and social posting (dry run)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

env:
  # Opt into Node.js 24 for actions as recommended by GitHub warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r footybitez/requirements.txt
        pip install python-dotenv

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: remotion-video/package-lock.json

    - name: Install Remotion dependencies
      run: |
        cd remotion-video
        npm install

    - name: Install System Dependencies (Browsers)
      run: |
        cd remotion-video
        npx playwright install-deps chromium

    - name: Install Playwright Browsers (for Remotion)
      run: |
        cd remotion-video
        npx playwright install chromium

    - name: Run Backfill Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
        GEMINI_API_KEY3: ${{ secrets.GEMINI_API_KEY3 }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GROQ_API_KEY2: ${{ secrets.GROQ_API_KEY2 }}
        GROQ_API_KEY3: ${{ secrets.GROQ_API_KEY3 }}
        API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        HUME_API_KEY_LONG_1: ${{ secrets.HUME_API_KEY_LONG_1 }}
        HUME_API_KEY_LONG_2: ${{ secrets.HUME_API_KEY_LONG_2 }}
        HUME_API_KEY_LONG_3: ${{ secrets.HUME_API_KEY_LONG_3 }}
        HUME_API_KEY_LONG_4: ${{ secrets.HUME_API_KEY_LONG_4 }}
        HUME_API_KEY_LONG_5: ${{ secrets.HUME_API_KEY_LONG_5 }}
        HUME_API_KEY_SHORT_1: ${{ secrets.HUME_API_KEY_SHORT_1 }}
        HUME_API_KEY_SHORT_2: ${{ secrets.HUME_API_KEY_SHORT_2 }}
        HUME_API_KEY_SHORT_3: ${{ secrets.HUME_API_KEY_SHORT_3 }}
        HUME_API_KEY_SHORT_4: ${{ secrets.HUME_API_KEY_SHORT_4 }}
        HUME_API_KEY_SHORT_5: ${{ secrets.HUME_API_KEY_SHORT_5 }}
        HUME_VOICE_ID: ${{ secrets.HUME_VOICE_ID }}
        HUME_VOICE_ID_1: ${{ secrets.HUME_VOICE_ID_1 }}
        HUME_VOICE_ID_2: ${{ secrets.HUME_VOICE_ID_2 }}
        ENABLE_UPLOAD: ${{ github.event.inputs.skip_upload == 'true' && 'false' || 'true' }}
        ENABLE_SOCIAL_PUBLISHING: ${{ github.event.inputs.skip_upload == 'true' && 'false' || 'true' }}
        META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
        TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
        TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
        TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        LIMIT_ARG=""
        if [ -n "${{ github.event.inputs.limit }}" ]; then
          LIMIT_ARG="--limit ${{ github.event.inputs.limit }}"
        fi
        SKIP_ARG=""
        if [ "${{ github.event.inputs.skip_upload }}" = "true" ]; then
          SKIP_ARG="--skip-upload"
        fi
        python footybitez/pipelines/backfill_pipeline.py $LIMIT_ARG $SKIP_ARG

    - name: Commit registry update
      if: always()
      run: |
        git config --global user.email "bot@footybitez.com"
        git config --global user.name "WC2026 Bot"
        git add match_registry.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Backfill match registry [skip ci]" && git push)
