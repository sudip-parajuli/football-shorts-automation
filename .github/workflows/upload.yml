name: Daily YouTube Upload

on:
  schedule:
    # 7:45 AM Nepal (UTC+5:45) = 00:00 AM UTC
    - cron: '0 0 * * *'
    # 6:45 PM Nepal (UTC+5:45) = 1:00 PM UTC
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  # Opt into Node.js 24 for actions as recommended by GitHub warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        pip install -r footybitez/requirements.txt
        pip install python-dotenv

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: remotion-video/package-lock.json

    - name: Install Remotion dependencies
      run: |
        cd remotion-video
        npm install

    - name: Install System Dependencies (Browsers)
      run: |
        # Use Playwright's official command to install all necessary system libs for the current OS version
        cd remotion-video
        npx playwright install-deps chromium

    - name: Install Playwright Browsers (for Remotion)
      run: |
        cd remotion-video
        npx playwright install chromium

    - name: Run Automation
      id: automation
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        HUME_API_KEY: ${{ secrets.HUME_API_KEY }}
        HUME_API_KEY2: ${{ secrets.HUME_API_KEY2 }}
        HUME_API_KEY3: ${{ secrets.HUME_API_KEY3 }}
        HUME_API_KEY4: ${{ secrets.HUME_API_KEY4 }}
        HUME_API_KEY5: ${{ secrets.HUME_API_KEY5 }}
        HUME_VOICE_ID: ${{ secrets.HUME_VOICE_ID }}
        HUME_VOICE_ID_1: ${{ secrets.HUME_VOICE_ID_1 }}
        HUME_VOICE_ID_2: ${{ secrets.HUME_VOICE_ID_2 }}
        ENABLE_UPLOAD: "true"
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python footybitez/main.py

    - name: Dump Python Logs (on Failure or Success)
      if: always()
      run: |
        echo "Searching for latest log file in footybitez/logs/..."
        # Find latest .log file, if any
        LATEST_LOG=$(ls -t footybitez/logs/*.log 2>/dev/null | head -1)
        if [ -n "$LATEST_LOG" ]; then
          echo "Dumping log file: $LATEST_LOG"
          cat "$LATEST_LOG"
        else
          echo "No log files found in footybitez/logs/"
        fi

    - name: Verify Video Generation
      run: |
        echo "Checking for generated video file..."
        if [ -f "footybitez/output/final_short.mp4" ]; then
          echo "Success: Video found at footybitez/output/final_short.mp4"
          ls -lh footybitez/output/final_short.mp4
        else
          echo "Error: Video NOT found at footybitez/output/final_short.mp4"
          echo "Listing all files for debugging..."
          ls -R
          exit 1
        fi

    - name: Upload Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: automation-logs
        path: footybitez/logs/

    - name: Upload Generated Video (Debug)
      uses: actions/upload-artifact@v4
      with:
        name: final-video
        path: footybitez/output/final_short.mp4
