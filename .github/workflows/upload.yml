name: Daily YouTube Upload

on:
  schedule:
    # 7:45 AM Nepal (UTC+5:45) = 00:00 AM UTC
    - cron: '0 0 * * *'
    # 6:45 PM Nepal (UTC+5:45) = 1:00 PM UTC
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        pip install -r footybitez/requirements.txt
        pip install python-dotenv

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: remotion-video/package-lock.json

    - name: Install Remotion dependencies
      run: |
        cd remotion-video
        npm install

    - name: Install Playwright Browsers (for Remotion)
      run: |
        # Remotion uses a browser to render. We need to install the browser and its dependencies.
        cd remotion-video
        npx playwright install chromium --with-deps

    - name: Run Automation
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        ENABLE_UPLOAD: "true"
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python footybitez/main.py

    - name: Upload Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: automation-logs
        path: footybitez/logs/

    - name: Upload Generated Video (Debug)
      uses: actions/upload-artifact@v4
      with:
        name: final-video
        path: footybitez/output/final_short.mp4
