name: Breaking News Monitor

on:
  schedule:
    # Every 5 minutes during typical match hours (14:00–23:00 UTC)
    # Covers afternoon and evening kick-offs across all World Cup time zones
    - cron: '*/5 14-23 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable verbose debug logging'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write   # Required to commit news_state.json back to repo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    # Hard cap: must finish before the next 5-minute trigger fires
    timeout-minutes: 4

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # Fetch with token so we can push state file back
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        pip install -r footybitez/requirements.txt
        pip install python-dotenv

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: remotion-video/package-lock.json

    - name: Install Remotion dependencies
      run: |
        cd remotion-video
        npm install

    - name: Install system browser dependencies
      run: |
        cd remotion-video
        npx playwright install-deps chromium

    - name: Install Playwright browser
      run: |
        cd remotion-video
        npx playwright install chromium

    - name: Run Breaking News Monitor
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        BSD_API_KEY: ${{ secrets.BSD_API_KEY }}
        YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        HUME_API_KEY: ${{ secrets.HUME_API_KEY }}
        HUME_VOICE_ID: ${{ secrets.HUME_VOICE_ID }}
        ENABLE_UPLOAD: 'true'
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python -m footybitez.pipelines.breaking_news_pipeline

    - name: Dump Python Logs (always)
      if: always()
      run: |
        LATEST_LOG=$(ls -t footybitez/logs/*.log 2>/dev/null | head -1)
        if [ -n "$LATEST_LOG" ]; then
          echo "=== Log: $LATEST_LOG ==="
          cat "$LATEST_LOG"
        fi
