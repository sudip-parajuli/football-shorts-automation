name: World Cup Daily Content

on:
  schedule:
    # 8am UTC — morning fact/quiz
    - cron: '0 8 * * *'
    # 8pm UTC — evening recap/preview
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Content category to produce'
        required: true
        default: 'wc_fact'
        type: choice
        options:
          - wc_quiz
          - wc_fact
          - wc_group_preview
          - wc_player_spotlight
          - wc_history
      skip_upload:
        description: 'Generate video but skip YouTube upload (for testing)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# NOTE: No date-gate in YAML — GitHub Actions expressions cannot compare dates natively.
# The Python script itself performs the date check and exits cleanly (code 0) outside
# the World Cup window (June 11 – July 19, 2026). Use workflow_dispatch with --force
# for testing outside the window.

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  worldcup:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        pip install -r footybitez/requirements.txt
        pip install python-dotenv

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: remotion-video/package-lock.json

    - name: Install Remotion dependencies
      run: |
        cd remotion-video
        npm install

    - name: Install system browser dependencies
      run: |
        cd remotion-video
        npx playwright install-deps chromium

    - name: Install Playwright browser
      run: |
        cd remotion-video
        npx playwright install chromium

    - name: Run World Cup Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        HUME_API_KEY: ${{ secrets.HUME_API_KEY }}
        HUME_VOICE_ID: ${{ secrets.HUME_VOICE_ID }}
        ENABLE_UPLOAD: ${{ github.event.inputs.skip_upload == 'true' && 'false' || 'true' }}
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        CATEGORY="${{ github.event.inputs.category || 'wc_fact' }}"
        echo "Running category: $CATEGORY"
        python -m footybitez.pipelines.worldcup_pipeline --category "$CATEGORY"

    - name: Dump Python Logs
      if: always()
      run: |
        LATEST_LOG=$(ls -t footybitez/logs/*.log 2>/dev/null | head -1)
        if [ -n "$LATEST_LOG" ]; then
          echo "=== Log: $LATEST_LOG ==="
          cat "$LATEST_LOG"
        fi

    - name: Upload Generated Video
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: worldcup-video
        path: footybitez/output/
